apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-demo
  namespace: nginx-demo
spec:
  ingressClassName: nginx
  tls:
    - hosts:
       - nginx.nerv.local
      secretName: nginx-demo-tls
  rules:
    - host: nginx.nerv.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
