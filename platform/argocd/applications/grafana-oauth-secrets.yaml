apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-oauth-secrets
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/staticparsley/homelab-nerv.git
    targetRevision: main
    path: platform/monitoring/secrets
    plugin:
      name: ksops-v1.0

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
