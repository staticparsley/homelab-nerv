apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adguard-home
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://repo.helmforge.dev
    chart: adguard-home
    targetRevision: 1.0.4
    helm:
      releaseName: adguard-home
      values: |
        service:
          web:
            type: ClusterIP
            port: 80
          dns:
            type: LoadBalancer
            port: 53
            loadBalancerIP: "192.168.1.241"

        ingress:
          enabled: true
          ingressClassName: nginx
          hosts:
            - host: adguard.nerv.local
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - adguard.nerv.local
              secretName: adguard-home-tls

        persistence:
          conf:
            enabled: true
            size: 256Mi
          work:
            enabled: true
            size: 2Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: adguard-home

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true