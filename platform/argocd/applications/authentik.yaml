apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  sources:
    - repoURL: https://charts.goauthentik.io
      chart: authentik
      targetRevision: "^2026.5"
      helm:
        releaseName: authentik
        valueFiles:
          - $values/platform/authentik/values.yaml

    - repoURL: https://github.com/staticparsley/homelab-nerv.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: authentik

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
