apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: quote-api
  namespace: argocd
spec:
  writeBackConfig:
    method: git:secret:argocd/image-updater-git-creds#creds
    gitConfig:
      branch: main
      writeBackTarget: kustomization

  applicationRefs:
    - namePattern: quote-api
      images:
        - alias: quote-api
          imageName: ghcr.io/staticparsley/quote-api
          updateStrategy: semver
          versionConstraint: ">=0.1.0"
          tagFilter: regexp:^v[0-9]+\.[0-9]+\.[0-9]+$