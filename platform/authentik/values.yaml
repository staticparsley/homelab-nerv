global:
  envFrom:
    - secretRef:
        name: authentik-secrets

authentik:
  error_reporting:
    enabled: false

server:
  replicas: 1

  ingress:
    enabled: true
    ingressClassName: nginx

    hosts:
      - authentik.nerv.local

    tls:
      - secretName: authentik-tls
        hosts:
          - authentik.nerv.local

    annotations:
      cert-manager.io/cluster-issuer: selfsigned-cluster-issuer

  metrics:
    enabled: true

    serviceMonitor:
      enabled: true

worker:
  replicas: 1

  metrics:
    enabled: true

    serviceMonitor:
      enabled: true

postgresql:
  enabled: true

  auth:
    username: authentik
    database: authentik
    existingSecret: authentik-secrets

  primary:
    persistence:
      enabled: true
      storageClass: local-path
      size: 8Gi
